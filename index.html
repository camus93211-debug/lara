<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>九州志 - 古代策略人生 (大宗师篇)</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="panel-creation" class="modal-overlay">
        <div class="modal-content" style="width: 350px;">
            <h3 style="margin-top:0;">🎭 捏骨塑魄</h3>
            <p style="font-size:13px; color:#666; text-align:center; margin-bottom:15px; text-indent:0;">请设定你的江湖名讳与天生根骨</p>
            
            <div style="margin-bottom: 15px; text-align: left;">
                <label><b>名讳：</b></label>
                <input type="text" id="char-name" value="无名氏" style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; background:#f4f1ea; border:1px solid #8c7355; font-family: '楷体';">
            </div>

            <div style="margin-bottom: 20px; text-align: left;">
                <label><b>天生根骨 (单选)：</b></label>
                <div style="display:flex; flex-direction:column; gap:8px; margin-top:8px;">
                    <label><input type="radio" name="trait" value="str" checked> <b>天生神力</b> (初始武勇+10，生命+50)</label>
                    <label><input type="radio" name="trait" value="int"> <b>聪颖过人</b> (初始智谋+10，真气+50)</label>
                    <label><input type="radio" name="trait" value="gold"> <b>家境殷实</b> (初始通宝+500)</label>
                </div>
            </div>
            
            <button onclick="Game.startGame()" style="width: 100%; background: var(--danger); font-size: 16px;">踏入江湖</button>
        </div>
    </div>

    <div id="event-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="event-title">📜 奇遇</h3>
            <p id="event-desc">事件描述文本...</p>
            <div id="event-choices" class="btn-group" style="display: flex; flex-direction: column;"></div>
        </div>
    </div>

    <div id="minimap-modal" class="modal-overlay hidden">
        <div class="modal-content" style="width: auto;">
            <h3 style="margin-top:0;">🗺️ 九州堪舆全图</h3>
            <canvas id="minimap-canvas" style="border: 2px solid var(--border-color); background: #2b2523; display: block; margin: 0 auto;"></canvas>
            <p style="font-size:12px; color:#666; text-align:center; margin-top:10px;">(红点代表你当前的位置。绿:平原, 蓝:水脉, 灰:高山, 墨绿:森林, 金:城池)</p>
            <button onclick="UI.hideMinimap()" style="width: 100%; margin-top: 10px;">收起地图</button>
        </div>
    </div>

    <div class="panel map-panel">
        <h3 id="view-title" style="display:flex; justify-content: space-between; align-items: center;">
            <span>🗺️ 九州图志</span>
            <button onclick="UI.showMinimap()" style="padding:4px 8px; font-size:12px; background:var(--primary);">📍 全域地图</button>
        </h3>
        <div id="grid-view" class="grid-container"></div>
        
        <div class="inventory-section">
            <div class="equipment-box">
                <h4 style="margin-top:0; text-align:center;">🛡️ 身上行头</h4>
                <div style="display:flex; justify-content: space-around; font-size: 13px;">
                    <div><b>兵刃：</b><span id="equip-weapon" style="color:var(--danger)">空手</span></div>
                    <div><b>防具：</b><span id="equip-armor" style="color:var(--danger)">布衣</span></div>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <h4 style="text-align: center; margin-top:0;">🎒 行囊</h4>
                    <div id="inventory-list" class="scroll-list"></div>
                </div>
                <div style="flex: 1;">
                    <h4 style="text-align: center; margin-top:0;">📖 已修武学</h4>
                    <div id="skills-list" class="scroll-list" style="background:#f4f1ea; border:1px inset #ccc; padding:5px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="panel control-panel">
        <div class="sys-bar">
            <button onclick="Game.saveGame()">💾 镌刻天书</button>
            <button onclick="Game.loadGame()">📂 时空回溯</button>
            <button onclick="location.reload()" style="background:var(--danger);">🔄 轮回转世</button>
        </div>

        <h3>👤 命格面板</h3>
        <div id="stats-display" class="stat-box"></div>
        <div id="quest-display" style="background:#fff; border:1px dashed var(--danger); padding:8px; margin-bottom:10px; font-size:12px; border-radius:4px; display:none;"></div>
        
        <div class="exp-bar-container">
            <div id="exp-bar-fill" class="exp-bar-fill" style="width: 0%;"></div>
            <div id="exp-text" class="exp-text">境界：初出茅庐 (0/100)</div>
        </div>

        <div id="panel-map" class="hidden">
            <h4>🧭 行走江湖</h4>
            <div class="btn-group">
                <button onclick="Game.movePlayer(0, -1)">⬆️ 向北 (漠北)</button>
                <button onclick="Game.movePlayer(0, 1)">⬇️ 向南 (江南)</button>
                <button onclick="Game.movePlayer(-1, 0)">⬅️ 向西 (昆仑)</button>
                <button onclick="Game.movePlayer(1, 0)">➡️ 向东 (东海)</button>
            </div>
            <p style="font-size:12px; color:#666; text-align:center;">(提示：寻找特定地貌，方能结交隐世宗门)</p>
        </div>

        <div id="panel-city" class="hidden">
            <h4>🏯 市井营生</h4>
            <div class="btn-group" style="grid-template-columns: 1fr 1fr;">
                <button class="action-btn" onclick="Game.cityAction('rest')">🛏️ 客栈打尖 (50文)</button>
                <button class="action-btn" onclick="Game.cityAction('buyPotion')">💊 药铺 (30文)</button>
                <button class="action-btn" onclick="Game.cityAction('buySword')">🗡️ 铁匠铺 (150文)</button>
                <button class="action-btn" onclick="Game.generateNPC()" style="background: #2a9d8f; color:white;">👤 街头寻访 (结交NPC)</button>
            </div>
            
            <h4>⛩️ 江湖与官府</h4>
            <div class="btn-group">
                <button style="background: var(--danger);" onclick="Game.takeQuest()">📜 衙门悬赏</button>
                <button style="background: var(--magic);" onclick="Game.visitSect()">🏔️ 拜访武林门派</button>
            </div>

            <h4>🌟 官职与营生</h4>
            <div id="city-identity-actions" style="margin-bottom: 15px;"></div>
            
            <button style="width: 100%; background: #5c6b61;" onclick="Game.exitCity()">🚶 离开城池，继续游历</button>
        </div>

        <div id="panel-battle" class="hidden">
            <h4 id="enemy-name-display">⚔️ 临阵对敌</h4>
            <div class="btn-group">
                <button onclick="Game.battleAction('move', 0, -1)">前进步伐</button>
                <button onclick="Game.battleAction('move', 0, 1)">后退拉扯</button>
                <button onclick="Game.battleAction('move', -1, 0)">向左游走</button>
                <button onclick="Game.battleAction('move', 1, 0)">向右包抄</button>
            </div>
            <div class="btn-group">
                <button class="danger-btn" onclick="Game.battleAction('attack')">🗡️ 白刃战</button>
                <button class="magic-btn" onclick="Game.battleAction('magic')">🔥 内力催动 (15MP)</button>
            </div>
            <button style="width: 100%; background: #888;" onclick="Game.fleeBattle()">🏳️ 走为上计</button>
        </div>

        <h4 style="margin-top: 15px;">📜 飞鸽传书 (日志)</h4>
        <div id="game-log"></div>
    </div>

    <script src="js/Data.js"></script>
    <script src="js/Entities.js"></script>
    <script src="js/UI.js"></script>
    <script src="js/Game.js"></script>
</body>
</html>
